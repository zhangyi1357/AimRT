aimrt:
  executor:
    executors:
    - name: client_statistics_executor
      options:
        thread_num: 4
      type: asio_thread
    - name: timeout_handle
      options:
        bind_executor: client_statistics_executor
      type: time_wheel
    - name: client_executor_0
      type: asio_thread
    - name: client_executor_1
      type: asio_thread
    - name: client_executor_2
      type: asio_thread
    - name: client_executor_3
      type: asio_thread
    - name: client_executor_4
      type: asio_thread
    - name: client_executor_5
      type: asio_thread
    - name: client_executor_6
      type: asio_thread
    - name: client_executor_7
      type: asio_thread
    - name: client_executor_8
      type: asio_thread
    - name: client_executor_9
      type: asio_thread
  log:
    backends:
    - type: console
    core_lvl: INFO
  module:
    modules:
    - log_lvl: INFO
      name: BenchmarkRpcClientModule
  plugin:
    plugins:
    - name: ros2_plugin
      options:
        executor_thread_num: 2
        executor_type: MultiThreaded
        node_name: example_ros2_pb_rpc_benchmark_client_node
      path: ${AIMRT_PLUGIN_DIR}/libaimrt_ros2_plugin.so
  rpc:
    backends:
    - options:
        timeout_executor: timeout_handle
      type: ros2
    clients_options:
    - enable_backends:
      - ros2
      func_name: (.*)
